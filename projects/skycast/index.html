<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyCast – 7‑Day Weather Forecast</title>
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0ea5e9, #6366f1, #7c3aed);
      background-size: 600% 600%;
      animation: gradientShift 12s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }
    @keyframes gradientShift {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .loader {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      z-index: 9999;
    }
    .spinner {
      width: 64px;
      height: 64px;
      border: 6px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.3); border-radius: 4px; }
  </style>
</head>
<body class="flex flex-col items-center p-4 text-white">
  <!-- Loading overlay -->
  <div id="loader" class="loader hidden"><div class="spinner"></div></div>

  <h1 class="text-4xl font-bold mt-8 mb-6 drop-shadow-md text-center">SkyCast</h1>

  <section class="w-full max-w-lg glass rounded-2xl p-6 shadow-xl">
    <form id="searchForm" class="flex gap-2">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name"
        required
        class="flex-1 px-4 py-2 rounded bg-white bg-opacity-20 text-white placeholder-gray-200 focus:outline-none"
      />
      <button type="submit" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-500 transition">Search</button>
    </form>
    <div id="errorMsg" class="mt-2 text-red-300 hidden"></div>
    <div id="forecast" class="mt-6"></div>
  </section>

  <script>
    const weatherMap = {
      0: {desc: 'Clear sky', icon: '☀️'},
      1: {desc: 'Mainly clear', icon: '🌤️'},
      2: {desc: 'Partly cloudy', icon: '⛅'},
      3: {desc: 'Overcast', icon: '☁️'},
      45: {desc: 'Fog', icon: '🌫️'},
      48: {desc: 'Depositing rime fog', icon: '🌫️'},
      51: {desc: 'Light drizzle', icon: '🌦️'},
      53: {desc: 'Moderate drizzle', icon: '🌦️'},
      55: {desc: 'Dense drizzle', icon: '🌧️'},
      56: {desc: 'Freezing drizzle', icon: '🌧️'},
      57: {desc: 'Heavy freezing drizzle', icon: '🌧️'},
      61: {desc: 'Slight rain', icon: '🌦️'},
      63: {desc: 'Moderate rain', icon: '🌧️'},
      65: {desc: 'Heavy rain', icon: '🌧️'},
      66: {desc: 'Light freezing rain', icon: '🌧️'},
      67: {desc: 'Heavy freezing rain', icon: '🌧️'},
      71: {desc: 'Slight snow fall', icon: '🌨️'},
      73: {desc: 'Moderate snow fall', icon: '🌨️'},
      75: {desc: 'Heavy snow fall', icon: '❄️'},
      77: {desc: 'Snow grains', icon: '❄️'},
      80: {desc: 'Slight rain showers', icon: '🌦️'},
      81: {desc: 'Moderate rain showers', icon: '🌧️'},
      82: {desc: 'Violent rain showers', icon: '🌧️'},
      85: {desc: 'Slight snow showers', icon: '🌨️'},
      86: {desc: 'Heavy snow showers', icon: '❄️'},
      95: {desc: 'Thunderstorm', icon: '⛈️'},
      96: {desc: 'Thunderstorm with slight hail', icon: '⛈️'},
      99: {desc: 'Thunderstorm with heavy hail', icon: '⛈️'}
    };

    const form = document.getElementById('searchForm');
    const cityInput = document.getElementById('cityInput');
    const forecastDiv = document.getElementById('forecast');
    const errorMsg = document.getElementById('errorMsg');
    const loader = document.getElementById('loader');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const city = cityInput.value.trim();
      if (!city) return;
      errorMsg.classList.add('hidden');
      forecastDiv.innerHTML = '';
      loader.classList.remove('hidden');

      try {
        // 1️⃣ Geocode with Nominatim (no key needed)
        const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
        const geoData = await geoRes.json();
        if (!geoData.length) throw new Error('City not found');
        const { lat, lon, display_name } = geoData[0];

        // 2️⃣ Fetch 7‑day forecast from Open‑Meteo
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
          `&daily=weathercode,temperature_2m_max,temperature_2m_min` +
          `&timezone=auto`
        );
        const weatherData = await weatherRes.json();
        if (!weatherData.daily) throw new Error('Weather data unavailable');

        renderForecast(display_name, weatherData.daily);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        loader.classList.add('hidden');
      }
    });

    function renderForecast(locationName, daily) {
      // Title
      const title = document.createElement('h2');
      title.className = 'text-2xl font-semibold mb-4 text-center';
      title.textContent = locationName;
      forecastDiv.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4';

      daily.time.slice(0, 7).forEach((dateStr, idx) => {
        const date = new Date(dateStr);
        const dayName = date.toLocaleDateString(undefined, { weekday: 'short' });
        const code = daily.weathercode[idx];
        const max = Math.round(daily.temperature_2m_max[idx]);
        const min = Math.round(daily.temperature_2m_min[idx]);
        const { desc, icon } = weatherMap[code] || { desc: 'Unknown', icon: '❔' };

        const card = document.createElement('div');
        card.className = 'glass rounded-xl p-4 flex flex-col items-center text-center space-y-2';
        card.innerHTML = `
          <div class="text-xl font-medium">${dayName}</div>
          <div class="text-4xl">${icon}</div>
          <div class="font-medium">${desc}</div>
          <div class="text-sm">${min}°C – ${max}°C</div>
        `;
        grid.appendChild(card);
        gsap.from(card, {opacity:0, y:30, delay: idx * 0.07, duration:0.6, ease:'power2.out'});
      });

      forecastDiv.appendChild(grid);
      // Fade‑in the whole forecast container
      gsap.from(title, {opacity:0, y:-20, duration:0.6, ease:'power2.out'});
    }
  </script>
</body>
</html>
